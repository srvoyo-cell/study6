<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная работа 7</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f5f0;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d7d2c8;
      border-radius: 8px;
      padding: 20px;
    }
    .row {
      margin: 12px 0;
    }
    select, input {
      padding: 6px;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      margin-top: 12px;
    }
    button {
      padding: 8px 14px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Лабораторная работа 7</h1>
    <p>Подсчёт стоимости покупки с использованием списка.</p>

    <div class="row">
      <label for="product">Товар:</label>
      <select id="product">
        <option value="50">Тетрадь (50 руб.)</option>
        <option value="120">Ручка (120 руб.)</option>
        <option value="300">Флешка (300 руб.)</option>
        <option value="900">Клавиатура (900 руб.)</option>
      </select>
    </div>

    <div class="row">
      <label for="quantity">Количество:</label>
      <input type="number" id="quantity" min="1" value="1">
    </div>

    <button type="button" onclick="addItem()">Добавить</button>
    <button type="button" onclick="clearCart()">Очистить</button>

    <textarea id="cart" readonly>Корзина пуста.</textarea>
    <p><strong>Итог:</strong> <span id="total">0</span> руб.</p>
  </div>

  <script>
    let total = 0;
    let lines = [];

    function addItem() {
      const product = document.getElementById('product');
      const quantity = Number(document.getElementById('quantity').value);
      const price = Number(product.value);
      const name = product.options[product.selectedIndex].text;

      if (!quantity || quantity < 1) {
        alert('Введите корректное количество.');
        return;
      }

      const sum = price * quantity;
      total += sum;
      lines.push(name + ' x ' + quantity + ' = ' + sum + ' руб.');

      document.getElementById('cart').value = lines.join('\n');
      document.getElementById('total').textContent = total;
    }

    function clearCart() {
      total = 0;
      lines = [];
      document.getElementById('cart').value = 'Корзина пуста.';
      document.getElementById('total').textContent = '0';
    }
  </script>
</body>
</html>
